<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專業版購屋財務與貸款分析器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    /* 隱藏捲軸但保留捲動功能 (針對彈出視窗) */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 圖示元件庫 ---
    const IconCalculator = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>;
    const IconHome = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const IconDollar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
    const IconWallet = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a8 8 0 0 1-5 7.59C14.1 21.29 13 22 12 22a8 8 0 0 1-8-8V7h15Z"/><path d="M19 15v-4"/></svg>;
    const IconShield = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.82 0 4.96.94 7 2a1 1 0 0 1 1 1v7z"/></svg>;
    const IconCar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H8.3a2 2 0 0 0-1.6.8L4 11l-5.16.86a1 1 0 0 0-.84.99V16h3m14 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0ZM7 16a2 2 0 1 1-4 0 2 2 0 0 1 4 0Z"/></svg>;
    const IconTable = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="9" y2="21"/><line x1="15" x2="15" y1="9" y2="21"/></svg>;
    const IconMessage = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
    const IconX = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>;
    const IconAlert = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

    // --- 輔助函式：產生單一貸款的月還款陣列 ---
    const generateLoanSchedule = (amount, annualRatePct, years, graceYears, method) => {
      if (amount <= 0) return [];
      const monthlyRate = (annualRatePct / 100) / 12;
      const totalMonths = years * 12;
      const graceMonths = graceYears * 12;
      const amortMonths = totalMonths - graceMonths;
      
      const schedule = [];
      let balance = amount;
      
      let equalPiPayment = 0;
      if (method === 'equal-pi' && amortMonths > 0 && monthlyRate > 0) {
        const temp = Math.pow(1 + monthlyRate, amortMonths);
        equalPiPayment = amount * ((temp * monthlyRate) / (temp - 1));
      }

      const equalPrincipalMonthly = amortMonths > 0 ? amount / amortMonths : 0;

      for (let m = 1; m <= totalMonths; m++) {
        let interest = balance * monthlyRate;
        let principal = 0;

        if (m > graceMonths) {
          if (method === 'equal-pi') {
            principal = monthlyRate > 0 ? equalPiPayment - interest : amount / amortMonths;
          } else { // equal-principal
            principal = equalPrincipalMonthly;
          }
        }
        
        if (m === totalMonths) principal = balance; // 尾數修正
        balance -= principal;
        if (balance < 0) balance = 0;
        
        schedule.push({ month: m, interest, principal, payment: interest + principal, balance });
      }
      return schedule;
    };

    const MortgageCalculator = () => {
      // 1. 房屋與車位資訊
      const [totalPrice, setTotalPrice] = useState(1500);
      const [sizePing, setSizePing] = useState(35);
      const [hasCarPark, setHasCarPark] = useState(true);
      const [carParkPrice, setCarParkPrice] = useState(200);
      const [carParkSize, setCarParkSize] = useState(10);
      
      const [ltv, setLtv] = useState(80);
      const [downPayment, setDownPayment] = useState(300);

      // 2. 隱藏成本
      const [agentFeeRate, setAgentFeeRate] = useState(2);
      const [taxFee, setTaxFee] = useState(15);
      const [decorationFee, setDecorationFee] = useState(80);

      // 3. 財務健康度 (收支比)
      const [monthlyIncome, setMonthlyIncome] = useState(12);

      // 4. 貸款條件
      const [loanScheme, setLoanScheme] = useState('youth');
      const [repaymentMethod, setRepaymentMethod] = useState('equal-pi');
      
      // 主貸款條件 (新青安預設)
      const [interestRate, setInterestRate] = useState(1.775);
      const [loanTerm, setLoanTerm] = useState(40);
      const [gracePeriod, setGracePeriod] = useState(5);

      // 組合貸款之「超過額度」條件 (一般首購預設)
      const [excessRate, setExcessRate] = useState(2.06);
      const [excessTerm, setExcessTerm] = useState(30);
      const [excessGrace, setExcessGrace] = useState(0);

      // UI 狀態
      const [showModal, setShowModal] = useState(false);

      const formatCurrency = (val) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(Math.round(val || 0));

      // --- 連動邏輯 ---
      const handleTotalPriceChange = (e) => {
        const newPrice = Number(e.target.value);
        setTotalPrice(newPrice);
        setDownPayment(Math.round(newPrice * (1 - ltv / 100) * 100) / 100);
      };
      const handleLtvChange = (e) => {
        const newLtv = Number(e.target.value);
        setLtv(newLtv);
        setDownPayment(Math.round(totalPrice * (1 - newLtv / 100) * 100) / 100);
      };
      const handleDpChange = (e) => {
        const newDp = Number(e.target.value);
        setDownPayment(newDp);
        if (totalPrice > 0) setLtv(Math.round(((totalPrice - newDp) / totalPrice) * 1000) / 10);
      };

      const applyScheme = (scheme) => {
        setLoanScheme(scheme);
        if (scheme === 'standard') {
          setInterestRate(2.06); setLoanTerm(30); setGracePeriod(0);
        } else if (scheme === 'youth') {
          setInterestRate(1.775); setLoanTerm(40); setGracePeriod(5);
        }
      };

      // --- 核心計算 (使用 useMemo 避免無謂重算) ---
      const calculation = useMemo(() => {
        // 1. 車位拆算單價
        let effectivePrice = totalPrice;
        let effectiveSize = sizePing;
        if (hasCarPark) {
          effectivePrice = Math.max(0, totalPrice - carParkPrice);
          effectiveSize = Math.max(0.1, sizePing - carParkSize);
        }
        const unitPrice = (effectivePrice / effectiveSize).toFixed(2);

        // 2. 購屋應備總現金
        const agentFeeTWD = (totalPrice * 10000) * (agentFeeRate / 100);
        const taxFeeTWD = taxFee * 10000;
        const decoFeeTWD = decorationFee * 10000;
        const dpTWD = downPayment * 10000;
        const totalCashNeeded = dpTWD + agentFeeTWD + taxFeeTWD + decoFeeTWD;

        // 3. 貸款總額與雙方案拆算
        const loanAmountTWD = Math.max(0, (totalPrice - downPayment) * 10000);
        let schedule1 = [];
        let schedule2 = [];
        let isDualLoan = false;

        if (loanScheme === 'youth' && loanAmountTWD > 10000000) {
          // 啟動雙貸款
          isDualLoan = true;
          schedule1 = generateLoanSchedule(10000000, interestRate, loanTerm, gracePeriod, repaymentMethod);
          schedule2 = generateLoanSchedule(loanAmountTWD - 10000000, excessRate, excessTerm, excessGrace, repaymentMethod);
        } else {
          // 單一貸款
          schedule1 = generateLoanSchedule(loanAmountTWD, interestRate, loanTerm, gracePeriod, repaymentMethod);
        }

        // 4. 合併月還款陣列
        const maxMonths = Math.max(schedule1.length, schedule2.length);
        const combinedMonthly = [];
        let totalInterest = 0;
        let maxMonthlyPayment = 0;

        for (let m = 0; m < maxMonths; m++) {
          const s1 = schedule1[m] || { interest: 0, principal: 0, payment: 0, balance: 0 };
          const s2 = schedule2[m] || { interest: 0, principal: 0, payment: 0, balance: 0 };
          
          const curPayment = s1.payment + s2.payment;
          if (curPayment > maxMonthlyPayment) maxMonthlyPayment = curPayment;
          totalInterest += (s1.interest + s2.interest);

          combinedMonthly.push({
            month: m + 1,
            interest: s1.interest + s2.interest,
            principal: s1.principal + s2.principal,
            payment: curPayment,
            balance: s1.balance + s2.balance
          });
        }

        // 5. 收支比 (以最高月繳款計算)
        const incomeTWD = monthlyIncome * 10000;
        const dti = incomeTWD > 0 ? (maxMonthlyPayment / incomeTWD) * 100 : 0;
        let dtiStatus = { color: 'bg-green-100 text-green-800 border-green-200', text: '安全 (餘裕充足)' };
        if (dti > 60) dtiStatus = { color: 'bg-red-100 text-red-800 border-red-200', text: '危險 (銀行恐拒貸)' };
        else if (dti > 35) dtiStatus = { color: 'bg-yellow-100 text-yellow-800 border-yellow-200', text: '警戒 (生活品質受限)' };

        // 6. 提煉 UI 顯示用的階段摘要 (Phase Summary)
        const displayPhases = [];
        if (combinedMonthly.length > 0) {
          if (repaymentMethod === 'equal-pi') {
            // 本息攤還：找出金額變化的轉折點 (四捨五入後差異大於10元視為不同階段)
            let currentPhase = { start: 1, end: 1, payment: combinedMonthly[0].payment };
            for (let i = 1; i < combinedMonthly.length; i++) {
              if (Math.abs(combinedMonthly[i].payment - currentPhase.payment) > 10) {
                currentPhase.end = i;
                displayPhases.push(currentPhase);
                currentPhase = { start: i + 1, end: i + 1, payment: combinedMonthly[i].payment };
              } else {
                currentPhase.end = i + 1;
              }
            }
            displayPhases.push(currentPhase); // push last phase
          } else {
            // 本金攤還：只顯示首期最高，以及找出第一個月的總金額
            displayPhases.push({ start: 1, end: maxMonths, payment: combinedMonthly[0].payment, type: 'principal' });
          }
        }

        // 7. 年度報表聚合 (Yearly aggregation)
        const yearlySchedule = [];
        for (let y = 0; y < Math.ceil(maxMonths / 12); y++) {
          let yInt = 0, yPrin = 0, yPay = 0, endBal = 0;
          for (let m = 0; m < 12; m++) {
            const idx = y * 12 + m;
            if (idx < combinedMonthly.length) {
              yInt += combinedMonthly[idx].interest;
              yPrin += combinedMonthly[idx].principal;
              yPay += combinedMonthly[idx].payment;
              endBal = combinedMonthly[idx].balance; // 取該年最後一個月的餘額
            }
          }
          yearlySchedule.push({ year: y + 1, payment: yPay, principal: yPrin, interest: yInt, balance: endBal });
        }

        return {
          unitPrice, totalCashNeeded, loanAmountTWD, agentFeeTWD, taxFeeTWD, decoFeeTWD, dpTWD,
          isDualLoan, maxMonthlyPayment, totalInterest, dti, dtiStatus, displayPhases, yearlySchedule,
          combinedMonthly
        };
      }, [totalPrice, sizePing, hasCarPark, carParkPrice, carParkSize, ltv, downPayment, 
          agentFeeRate, taxFee, decorationFee, monthlyIncome, loanScheme, repaymentMethod, 
          interestRate, loanTerm, gracePeriod, excessRate, excessTerm, excessGrace]);

      // --- 分享至 LINE ---
      const handleShareToLine = () => {
        const shareText = `🏠 購屋財務健檢報告\n------------------\n` +
          `💰 總價：${totalPrice}萬 ${hasCarPark ? `(含車位${carParkPrice}萬)` : ''}\n` +
          `💎 實際單價：${calculation.unitPrice} 萬/坪\n` +
          `🏦 貸款成數：${ltv}%\n` +
          `💸 應備總現金：${formatCurrency(calculation.totalCashNeeded)} (含頭款、仲介、稅費與裝潢)\n` +
          `📊 收支比(DTI)：${calculation.dti.toFixed(1)}% [${calculation.dtiStatus.text}]\n` +
          `------------------\n` +
          `🏦 貸款總額：${formatCurrency(calculation.loanAmountTWD)}\n` +
          `${calculation.isDualLoan ? `⚠️ 採新青安+一般貸款組合計算\n` : ''}` +
          `🔄 攤還方式：${repaymentMethod === 'equal-pi' ? '本息平均' : '本金平均'}\n` +
          `📈 最高月繳：${formatCurrency(calculation.maxMonthlyPayment)}\n` +
          `------------------\n💡 試算結果僅供參考。`;

        const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
        window.open(lineUrl, '_blank');
      };

      return (
        <div className="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
          <div className="max-w-6xl mx-auto">
            
            {/* Header */}
            <div className="flex items-center space-x-4 mb-8">
              <div className="bg-blue-600 p-3.5 rounded-2xl text-white shadow-lg shadow-blue-200">
                <IconCalculator size={32} />
              </div>
              <div>
                <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">購屋財務與貸款分析器</h1>
                <p className="text-gray-500 mt-1">整合車位拆算、新青安組合貸款、現金流評估的專業版工具</p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              {/* === 左側：輸入區 === */}
              <div className="lg:col-span-7 space-y-6">
                
                {/* 1. 房屋與車位資訊 */}
                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8">
                  <div className="flex items-center space-x-2 mb-6 text-blue-800 border-b border-gray-100 pb-3">
                    <IconHome size={22} className="text-blue-600"/>
                    <h2 className="text-xl font-bold">房屋與車位資訊</h2>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-5 mb-5">
                    <div className="col-span-2 sm:col-span-1">
                      <label className="block text-sm font-semibold text-gray-700 mb-1">房屋總價 (萬元)</label>
                      <input type="number" value={totalPrice} onChange={handleTotalPriceChange} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium" />
                    </div>
                    <div className="col-span-2 sm:col-span-1">
                      <label className="block text-sm font-semibold text-gray-700 mb-1">總建坪 (坪)</label>
                      <input type="number" value={sizePing} onChange={(e) => setSizePing(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium" />
                    </div>
                  </div>

                  {/* 車位開關與輸入 */}
                  <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 mb-5">
                    <label className="flex items-center cursor-pointer mb-3">
                      <input type="checkbox" checked={hasCarPark} onChange={() => setHasCarPark(!hasCarPark)} className="w-5 h-5 rounded text-blue-600 focus:ring-blue-500 border-gray-300" />
                      <span className="ml-2 font-semibold text-blue-900 flex items-center"><IconCar size={18} className="mr-1"/> 包含車位 (啟用車位單價拆算)</span>
                    </label>
                    {hasCarPark && (
                      <div className="grid grid-cols-2 gap-4 mt-3">
                        <div>
                          <label className="block text-xs font-medium text-blue-800 mb-1">車位總價 (萬元)</label>
                          <input type="number" value={carParkPrice} onChange={(e) => setCarParkPrice(Number(e.target.value))} className="w-full px-3 py-2 bg-white border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-blue-800 mb-1">車位坪數 (坪)</label>
                          <input type="number" value={carParkSize} onChange={(e) => setCarParkSize(Number(e.target.value))} className="w-full px-3 py-2 bg-white border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="grid grid-cols-2 gap-5">
                    <div className="col-span-2 sm:col-span-1">
                      <label className="block text-sm font-semibold text-gray-700 mb-1">貸款成數 (%)</label>
                      <input type="number" value={ltv} onChange={handleLtvChange} max="100" className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium" />
                    </div>
                    <div className="col-span-2 sm:col-span-1">
                      <label className="block text-sm font-semibold text-gray-700 mb-1">自備頭期款 (萬元)</label>
                      <input type="number" value={downPayment} onChange={handleDpChange} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium" />
                    </div>
                  </div>

                  {/* 顯示真實單價 */}
                  <div className="mt-6 flex justify-between items-end border-t border-gray-100 pt-5">
                    <div>
                      <p className="text-sm font-medium text-gray-500">扣除車位後</p>
                      <p className="text-gray-800 font-bold">真實房屋單價</p>
                    </div>
                    <div className="text-right">
                      <span className="text-3xl font-extrabold text-blue-600">{calculation.unitPrice}</span>
                      <span className="text-gray-500 ml-1 font-medium">萬/坪</span>
                    </div>
                  </div>
                </div>

                {/* 2. 隱藏成本與準備金 */}
                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8">
                  <div className="flex items-center space-x-2 mb-6 text-orange-800 border-b border-gray-100 pb-3">
                    <IconWallet size={22} className="text-orange-600"/>
                    <h2 className="text-xl font-bold">購屋隱藏成本估算</h2>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">買方仲介費 (%)</label>
                      <input type="number" step="0.1" value={agentFeeRate} onChange={(e) => setAgentFeeRate(Number(e.target.value))} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
                      <p className="text-xs text-gray-400 mt-1">約 {Math.round(totalPrice * agentFeeRate / 100)} 萬</p>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">代書與稅費 (萬元)</label>
                      <input type="number" value={taxFee} onChange={(e) => setTaxFee(Number(e.target.value))} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
                      <p className="text-xs text-gray-400 mt-1">契稅、印花、規費</p>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">裝潢家電預算 (萬元)</label>
                      <input type="number" value={decorationFee} onChange={(e) => setDecorationFee(Number(e.target.value))} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" />
                      <p className="text-xs text-gray-400 mt-1">入住前必要花費</p>
                    </div>
                  </div>
                </div>

                {/* 3. 貸款條件與雙組合設定 */}
                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8">
                  <div className="flex items-center space-x-2 text-green-700 mb-6 border-b border-gray-100 pb-3">
                    <IconDollar size={22} className="text-green-600"/>
                    <h2 className="text-xl font-bold text-gray-800">貸款條件設定</h2>
                  </div>

                  <div className="mb-6 bg-gray-100 p-1.5 rounded-xl flex space-x-1">
                    <button onClick={() => applyScheme('standard')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${loanScheme === 'standard' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}>一般首購</button>
                    <button onClick={() => applyScheme('youth')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${loanScheme === 'youth' ? 'bg-white shadow-sm text-green-700 border border-green-100' : 'text-gray-500 hover:text-gray-700'}`}>🚀 新青安專案</button>
                    <button onClick={() => setLoanScheme('custom')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${loanScheme === 'custom' ? 'bg-white shadow-sm text-purple-700' : 'text-gray-500 hover:text-gray-700'}`}>自訂條件</button>
                  </div>

                  {calculation.isDualLoan && (
                    <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-2xl">
                      <p className="text-sm font-bold text-green-800 mb-1 flex items-center"><IconAlert size={16} className="mr-1"/> 啟動新青安雙貸款組合拆算</p>
                      <p className="text-xs text-green-700 mb-3">您的貸款總額為 {calculation.loanAmountTWD / 10000} 萬，超過新青安 1,000 萬上限。系統將自動拆分計算：</p>
                      <div className="grid grid-cols-2 gap-3 text-sm">
                        <div className="bg-white p-3 rounded-xl shadow-sm border border-green-100">
                          <span className="block text-green-600 font-bold mb-1">額度內 (1,000萬)</span>
                          使用下方設定之新青安利率與條件。
                        </div>
                        <div className="bg-white p-3 rounded-xl shadow-sm border border-blue-100">
                          <span className="block text-blue-600 font-bold mb-1">超過部分 ({(calculation.loanAmountTWD/10000 - 1000).toFixed(1)}萬)</span>
                          <div className="space-y-2 mt-2">
                            <div className="flex items-center justify-between"><span className="text-gray-500 text-xs">利率%</span><input type="number" step="0.01" value={excessRate} onChange={e=>setExcessRate(Number(e.target.value))} className="w-16 border rounded px-1 text-right text-xs py-0.5" /></div>
                            <div className="flex items-center justify-between"><span className="text-gray-500 text-xs">年限</span><input type="number" value={excessTerm} onChange={e=>setExcessTerm(Number(e.target.value))} className="w-16 border rounded px-1 text-right text-xs py-0.5" /></div>
                            <div className="flex items-center justify-between"><span className="text-gray-500 text-xs">寬限期</span><input type="number" value={excessGrace} onChange={e=>setExcessGrace(Number(e.target.value))} className="w-16 border rounded px-1 text-right text-xs py-0.5" /></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">主方案年利率 (%)</label>
                      <input type="number" step="0.001" value={interestRate} onChange={(e)=>{setInterestRate(Number(e.target.value)); setLoanScheme('custom');}} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none font-medium" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">貸款年限 (年)</label>
                      <select value={loanTerm} onChange={(e)=>{setLoanTerm(Number(e.target.value)); setLoanScheme('custom');}} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none font-medium">
                        <option value={20}>20 年</option><option value={30}>30 年</option><option value={40}>40 年</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">寬限期 (年)</label>
                      <select value={gracePeriod} onChange={(e)=>{setGracePeriod(Number(e.target.value)); setLoanScheme('custom');}} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none font-medium">
                        <option value={0}>無寬限期</option><option value={1}>1 年</option><option value={2}>2 年</option>
                        <option value={3}>3 年</option><option value={4}>4 年</option><option value={5}>5 年</option>
                      </select>
                    </div>
                  </div>

                  <label className="block text-sm font-bold text-gray-700 mb-2">攤還方式</label>
                  <div className="bg-gray-100 p-1.5 rounded-xl flex space-x-1">
                    <button onClick={() => setRepaymentMethod('equal-pi')} className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all ${repaymentMethod === 'equal-pi' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>本息平均攤還</button>
                    <button onClick={() => setRepaymentMethod('equal-principal')} className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all ${repaymentMethod === 'equal-principal' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>本金平均攤還</button>
                  </div>
                </div>
              </div>

              {/* === 右側：浮動結果區 === */}
              <div className="lg:col-span-5 flex flex-col space-y-6">
                
                {/* 財務健康度 (DTI) 卡片 */}
                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 md:p-8">
                  <div className="flex items-center space-x-2 text-purple-800 mb-5 border-b border-gray-100 pb-3">
                    <IconShield size={22} className="text-purple-600"/>
                    <h2 className="text-xl font-bold">買房負擔能力 (收支比)</h2>
                  </div>
                  <div className="mb-4">
                    <label className="block text-sm font-semibold text-gray-700 mb-1">家庭每月總收入 (萬元)</label>
                    <input type="number" value={monthlyIncome} onChange={(e) => setMonthlyIncome(Number(e.target.value))} placeholder="例如: 12" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none font-bold text-lg text-purple-900" />
                  </div>
                  <div className={`mt-4 p-4 rounded-2xl border flex items-center justify-between transition-colors ${calculation.dtiStatus.color}`}>
                    <div>
                      <p className="text-xs font-bold uppercase tracking-wider opacity-75">房貸佔收入比</p>
                      <p className="text-lg font-extrabold">{calculation.dti.toFixed(1)} %</p>
                    </div>
                    <div className="text-right">
                      <p className="text-sm font-bold">{calculation.dtiStatus.text}</p>
                    </div>
                  </div>
                </div>

                {/* 核心試算結果黑卡 */}
                <div className="bg-gray-900 rounded-3xl shadow-xl p-6 md:p-8 text-white flex-grow flex flex-col relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 -mr-10 -mt-10"></div>
                  <div className="absolute bottom-0 left-0 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 -ml-10 -mb-10"></div>
                  
                  <h2 className="text-2xl font-bold mb-6 border-b border-gray-800 pb-4 relative z-10">總結算報告</h2>
                  
                  <div className="space-y-6 flex-grow relative z-10">
                    
                    {/* 現金準備 */}
                    <div className="bg-gray-800/50 p-5 rounded-2xl border border-gray-700/50">
                      <p className="text-gray-400 text-sm font-medium mb-1">簽約至交屋 應備總現金</p>
                      <p className="text-4xl font-extrabold text-white tracking-tight">{formatCurrency(calculation.totalCashNeeded)}</p>
                      <p className="text-gray-400 text-xs mt-2 font-medium">包含頭款 {calculation.dpTWD/10000}萬 + 稅費裝潢等雜支 {(calculation.agentFeeTWD+calculation.taxFeeTWD+calculation.decoFeeTWD)/10000}萬</p>
                    </div>

                    <div className="h-px bg-gray-800 w-full"></div>

                    {/* 月還款細節 */}
                    <div>
                      <p className="text-gray-400 text-sm font-medium mb-3 flex items-center justify-between">
                        <span>每月房貸還款</span>
                        {calculation.isDualLoan && <span className="bg-blue-900 text-blue-200 text-xs px-2 py-0.5 rounded-full">雙貸款組合</span>}
                      </p>
                      
                      <div className="space-y-3">
                        {calculation.displayPhases.map((phase, idx) => (
                          <div key={idx} className={`p-4 rounded-2xl border ${idx === calculation.displayPhases.length - 1 && repaymentMethod === 'equal-pi' ? 'bg-blue-900/20 border-blue-500/30' : 'bg-gray-800/40 border-gray-700/50'}`}>
                            <div className="flex justify-between items-center mb-1">
                              <span className="text-sm font-medium text-gray-300">
                                {repaymentMethod === 'equal-pi' 
                                  ? `第 ${Math.ceil(phase.start/12)}~${Math.ceil(phase.end/12)} 年`
                                  : '首月最高繳款'}
                              </span>
                              {phase.payment === calculation.maxMonthlyPayment && <span className="text-xs bg-red-500/20 text-red-300 px-2 py-0.5 rounded-full border border-red-500/20">最高</span>}
                            </div>
                            <p className="text-2xl font-bold text-white">
                              {formatCurrency(phase.payment)} <span className="text-sm font-normal text-gray-500">/月</span>
                            </p>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="h-px bg-gray-800 w-full"></div>

                    {/* 利息總額 */}
                    <div className="flex justify-between items-center">
                      <p className="text-gray-400 text-sm font-medium">貸款期間總利息</p>
                      <p className="text-xl font-bold text-red-400">{formatCurrency(calculation.totalInterest)}</p>
                    </div>
                  </div>

                  <div className="mt-8 space-y-3 relative z-10">
                    <button onClick={() => setShowModal(true)} className="w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center transition-all">
                      <IconTable size={18} className="mr-2" />
                      查看年度還款明細表
                    </button>
                    <button onClick={handleShareToLine} className="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center transition-all shadow-lg hover:shadow-xl">
                      <IconMessage size={18} className="mr-2" />
                      LINE 傳送健檢報告
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </div>

          {/* === 年度還款明細 Modal === */}
          {showModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                
                {/* Modal Header */}
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                  <div>
                    <h3 className="text-xl font-bold text-gray-900">年度還款明細表</h3>
                    <p className="text-sm text-gray-500 mt-1">總貸款：{formatCurrency(calculation.loanAmountTWD)} | 總利息：{formatCurrency(calculation.totalInterest)}</p>
                  </div>
                  <button onClick={() => setShowModal(false)} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-200 rounded-full transition-colors">
                    <IconX size={24} />
                  </button>
                </div>

                {/* Modal Table Body */}
                <div className="flex-grow overflow-y-auto p-0 no-scrollbar relative">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 bg-white/95 backdrop-blur shadow-sm z-10">
                      <tr>
                        <th className="py-3 px-6 text-sm font-bold text-gray-700 border-b">年度</th>
                        <th className="py-3 px-6 text-sm font-bold text-gray-700 border-b text-right">該年繳款總額</th>
                        <th className="py-3 px-6 text-sm font-bold text-gray-700 border-b text-right">其中本金</th>
                        <th className="py-3 px-6 text-sm font-bold text-gray-700 border-b text-right">其中利息</th>
                        <th className="py-3 px-6 text-sm font-bold text-blue-700 border-b text-right bg-blue-50/30">年底剩餘房貸</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {calculation.yearlySchedule.map((row) => (
                        <tr key={row.year} className="hover:bg-gray-50 transition-colors">
                          <td className="py-3 px-6 text-sm font-medium text-gray-900">第 {row.year} 年</td>
                          <td className="py-3 px-6 text-sm text-gray-600 text-right">{formatCurrency(row.payment)}</td>
                          <td className="py-3 px-6 text-sm text-gray-600 text-right">{formatCurrency(row.principal)}</td>
                          <td className="py-3 px-6 text-sm text-red-500 text-right">{formatCurrency(row.interest)}</td>
                          <td className="py-3 px-6 text-sm font-bold text-blue-700 text-right bg-blue-50/10">{formatCurrency(row.balance)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MortgageCalculator />);
  </script>
</body>
</html>
