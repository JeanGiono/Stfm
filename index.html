<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購屋財務與貸款分析器</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用於在瀏覽器編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 ---
    const IconCalculator = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>
    );
    const IconHome = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    );
    const IconDollar = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    );
    const IconPercent = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
    );
    const IconCalendar = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
    );
    const IconAlert = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );
    const IconMessage = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
    );
    const IconSearch = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    );
    const IconExternalLink = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    );

    const MortgageCalculator = () => {
      // --- 狀態管理 (預設值) ---
      const [totalPrice, setTotalPrice] = useState(1500);
      const [sizePing, setSizePing] = useState(25);
      const [downPayment, setDownPayment] = useState(300);
      
      const [loanTerm, setLoanTerm] = useState(30);
      const [gracePeriod, setGracePeriod] = useState(0);
      const [interestRate, setInterestRate] = useState(2.06);
      
      // 新增：攤還方式 ('equal-pi' 本息平均, 'equal-principal' 本金平均)
      const [repaymentMethod, setRepaymentMethod] = useState('equal-pi');

      // --- 計算結果狀態 ---
      const [results, setResults] = useState({
        unitPrice: 0, 
        loanAmount: 0, 
        monthlyPaymentGrace: 0,
        monthlyPaymentAmortization: 0, 
        firstMonthAmortization: 0, // 用於本金攤還
        monthlyDecrease: 0,        // 用於本金攤還
        totalInterest: 0, 
        totalPayment: 0
      });

      // --- 格式化工具 ---
      const formatCurrency = (value) => {
        return new Intl.NumberFormat('zh-TW', {
          style: 'currency', currency: 'TWD', maximumFractionDigits: 0
        }).format(Math.round(value));
      };

      // --- 快速套用方案 ---
      const applyNewYouthScheme = () => { setInterestRate(1.775); setLoanTerm(40); setGracePeriod(5); };
      const applyStandardScheme = () => { setInterestRate(2.06); setLoanTerm(30); setGracePeriod(0); };

      // --- 分享至 LINE ---
      const handleShareToLine = () => {
        const methodText = repaymentMethod === 'equal-pi' ? '本息平均攤還' : '本金平均攤還';
        
        let amortizationText = '';
        if (repaymentMethod === 'equal-pi') {
          amortizationText = `${formatCurrency(results.monthlyPaymentAmortization)} (固定)`;
        } else {
          amortizationText = `首月 ${formatCurrency(results.firstMonthAmortization)} (之後每月遞減 ${formatCurrency(results.monthlyDecrease)})`;
        }

        const shareText = `🏠 購屋財務試算結果\n------------------\n💰 房屋總價：${totalPrice} 萬元\n📐 建坪大小：${sizePing} 坪\n💎 坪數單價：${results.unitPrice} 萬/坪\n🏦 貸款總額：${formatCurrency(results.loanAmount)}\n📊 貸款條件：利率 ${interestRate}% / ${loanTerm}年 / 寬限期 ${gracePeriod}年\n🔄 攤還方式：${methodText}\n------------------\n${gracePeriod > 0 
          ? `🗓️ 前 ${gracePeriod} 年每月還款：${formatCurrency(results.monthlyPaymentGrace)} (僅繳利息)\n🗓️ 第 ${gracePeriod + 1} 年起還款：${amortizationText}` 
          : `🗓️ 每月還款金額：${amortizationText}`}\n------------------\n💡 本試算僅供參考，實際核貸結果依銀行為準。`;

        const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
        window.open(lineUrl, '_blank');
      };

      // --- 核心計算邏輯 ---
      useEffect(() => {
        const unitPrice = sizePing > 0 ? (totalPrice / sizePing).toFixed(2) : 0;
        const loanAmountTWD = Math.max(0, (totalPrice - downPayment) * 10000);
        
        const monthlyRate = (interestRate / 100) / 12;
        const totalMonths = loanTerm * 12;
        const graceMonths = gracePeriod * 12;
        const amortizationMonths = totalMonths - graceMonths;

        let monthlyGrace = 0; 
        let monthlyAmortization = 0; 
        let firstMonthAmortization = 0;
        let monthlyDecrease = 0;
        let totalInterestPaid = 0;

        if (loanAmountTWD > 0 && interestRate > 0) {
          monthlyGrace = loanAmountTWD * monthlyRate;
          
          if (amortizationMonths > 0) {
            if (repaymentMethod === 'equal-pi') {
              // 【本息平均攤還】
              const temp = Math.pow(1 + monthlyRate, amortizationMonths);
              const amortizationRate = (temp * monthlyRate) / (temp - 1);
              monthlyAmortization = loanAmountTWD * amortizationRate;
              
              const totalPaid = (monthlyGrace * graceMonths) + (monthlyAmortization * amortizationMonths);
              totalInterestPaid = totalPaid - loanAmountTWD;
            } else {
              // 【本金平均攤還】
              const monthlyPrincipal = loanAmountTWD / amortizationMonths;
              firstMonthAmortization = monthlyPrincipal + (loanAmountTWD * monthlyRate);
              monthlyDecrease = monthlyPrincipal * monthlyRate; // 每月減少的利息
              
              // 總利息 = 寬限期利息 + 攤還期利息(等差數列和公式)
              const amortizationInterest = ((amortizationMonths + 1) * loanAmountTWD * monthlyRate) / 2;
              totalInterestPaid = (monthlyGrace * graceMonths) + amortizationInterest;
            }
          } else {
             totalInterestPaid = monthlyGrace * graceMonths;
          }
        } else if (interestRate === 0 && amortizationMonths > 0) {
          // 零利率的極端狀況
          monthlyAmortization = loanAmountTWD / amortizationMonths;
          firstMonthAmortization = monthlyAmortization;
        }

        setResults({
          unitPrice: parseFloat(unitPrice), 
          loanAmount: loanAmountTWD,
          monthlyPaymentGrace: monthlyGrace, 
          monthlyPaymentAmortization: monthlyAmortization,
          firstMonthAmortization: firstMonthAmortization,
          monthlyDecrease: monthlyDecrease,
          totalInterest: totalInterestPaid, 
          totalPayment: loanAmountTWD + totalInterestPaid
        });
      }, [totalPrice, sizePing, downPayment, loanTerm, gracePeriod, interestRate, repaymentMethod]);

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 text-gray-800">
          <div className="max-w-5xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="flex items-center space-x-3 mb-8">
              <div className="bg-blue-600 p-3 rounded-lg text-white shadow-md">
                <IconCalculator size={28} />
              </div>
              <div>
                <h1 className="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">購屋財務與貸款分析器</h1>
                <p className="text-gray-500 text-sm md:text-base mt-1">整合單價分析與新青安貸款試算</p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
              
              {/* 左側：輸入區 */}
              <div className="lg:col-span-7 space-y-6">
                
                {/* 房屋資訊卡片 */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                  <div className="flex items-center space-x-2 mb-5 text-blue-800 border-b border-gray-50 pb-3">
                    <IconHome size={22} className="text-blue-600"/>
                    <h2 className="text-xl font-semibold">房屋與資金資訊</h2>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">房屋總價 (萬元)</label>
                      <input type="number" value={totalPrice} onChange={(e) => setTotalPrice(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">建坪大小 (坪)</label>
                      <input type="number" value={sizePing} onChange={(e) => setSizePing(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
                    </div>
                    <div className="md:col-span-2">
                      <label className="block text-sm font-medium text-gray-700 mb-1">自備頭期款 (萬元)</label>
                      <input type="number" value={downPayment} onChange={(e) => setDownPayment(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" />
                      {downPayment > totalPrice && (
                        <p className="text-red-500 text-sm mt-2 flex items-center bg-red-50 p-2 rounded-lg">
                          <IconAlert size={16} className="mr-1.5" /> 頭期款不能大於房屋總價
                        </p>
                      )}
                    </div>
                  </div>

                  <div className="mt-5 bg-blue-50/70 p-4 rounded-xl border border-blue-100/50 flex items-center justify-between">
                    <span className="text-gray-700 font-medium">換算坪數單價</span>
                    <span className="text-xl font-bold text-blue-700">
                      {results.unitPrice} <span className="text-sm font-normal text-gray-500">萬/坪</span>
                    </span>
                  </div>
                </div>

                {/* 市場行情查詢卡片 */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                  <div className="flex items-center space-x-2 mb-4 text-purple-800 border-b border-gray-50 pb-3">
                    <IconSearch size={22} className="text-purple-600"/>
                    <h2 className="text-xl font-semibold">市場行情與實價登錄查詢</h2>
                  </div>
                  <p className="text-sm text-gray-500 mb-4">出價或試算前，建議多方比對周邊歷史成交與待售物件：</p>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <a href="https://lvr.land.moi.gov.tw/" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center space-x-2 px-4 py-3 bg-gray-50 hover:bg-purple-50 hover:text-purple-700 text-gray-700 rounded-xl border border-gray-200 hover:border-purple-200 transition-colors font-medium text-sm shadow-sm">
                      <span>內政部實價登錄</span>
                      <IconExternalLink size={14} />
                    </a>
                    <a href="https://www.leju.com.tw/" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center space-x-2 px-4 py-3 bg-gray-50 hover:bg-blue-50 hover:text-blue-700 text-gray-700 rounded-xl border border-gray-200 hover:border-blue-200 transition-colors font-medium text-sm shadow-sm">
                      <span>樂居 Leju</span>
                      <IconExternalLink size={14} />
                    </a>
                    <a href="https://www.591.com.tw/" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center space-x-2 px-4 py-3 bg-gray-50 hover:bg-orange-50 hover:text-orange-600 text-gray-700 rounded-xl border border-gray-200 hover:border-orange-200 transition-colors font-medium text-sm shadow-sm">
                      <span>591 房屋交易</span>
                      <IconExternalLink size={14} />
                    </a>
                  </div>
                </div>

                {/* 貸款設定卡片 */}
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-5 border-b border-gray-50 pb-3">
                    <div className="flex items-center space-x-2 text-green-700 mb-4 sm:mb-0">
                      <IconDollar size={22} className="text-green-600"/>
                      <h2 className="text-xl font-semibold text-gray-800">貸款條件設定</h2>
                    </div>
                    <div className="flex space-x-2">
                      <button onClick={applyStandardScheme} className="text-sm px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-lg transition-colors font-medium border border-gray-200">
                        一般首購 (2.06%)
                      </button>
                      <button onClick={applyNewYouthScheme} className="text-sm px-4 py-2 bg-green-50 hover:bg-green-100 text-green-700 rounded-lg transition-colors font-medium border border-green-200 flex items-center shadow-sm">
                        🚀 新青安 (1.775%)
                      </button>
                    </div>
                  </div>

                  {/* 攤還方式切換器 (Segmented Control) */}
                  <div className="mb-6 bg-gray-100 p-1.5 rounded-xl flex">
                    <button 
                      onClick={() => setRepaymentMethod('equal-pi')}
                      className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all ${repaymentMethod === 'equal-pi' ? 'bg-white shadow-sm text-green-700' : 'text-gray-500 hover:text-gray-700'}`}
                    >
                      本息平均攤還 (每月固定)
                    </button>
                    <button 
                      onClick={() => setRepaymentMethod('equal-principal')}
                      className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all ${repaymentMethod === 'equal-principal' ? 'bg-white shadow-sm text-green-700' : 'text-gray-500 hover:text-gray-700'}`}
                    >
                      本金平均攤還 (先高後低)
                    </button>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center"><IconPercent size={14} className="mr-1 text-gray-400"/> 年利率 (%)</label>
                      <input type="number" step="0.001" value={interestRate} onChange={(e) => setInterestRate(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-all outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center"><IconCalendar size={14} className="mr-1 text-gray-400"/> 貸款年限 (年)</label>
                      <select value={loanTerm} onChange={(e) => setLoanTerm(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-all outline-none appearance-none">
                        <option value={20}>20 年</option>
                        <option value={30}>30 年</option>
                        <option value={40}>40 年</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center"><IconCalendar size={14} className="mr-1 text-gray-400"/> 寬限期 (年)</label>
                      <select value={gracePeriod} onChange={(e) => setGracePeriod(Number(e.target.value))} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-all outline-none appearance-none">
                        <option value={0}>無寬限期</option>
                        <option value={1}>1 年</option>
                        <option value={2}>2 年</option>
                        <option value={3}>3 年</option>
                        <option value={4}>4 年</option>
                        <option value={5}>5 年</option>
                      </select>
                    </div>
                  </div>
                  
                  {interestRate === 1.775 && (
                    <div className="mt-5 text-sm text-green-800 bg-green-50 p-4 rounded-xl border border-green-100 flex items-start">
                      <IconAlert size={18} className="mr-2 flex-shrink-0 mt-0.5 text-green-600" />
                      <p className="leading-relaxed">您已套用「新青安方案」預設值。請注意：新青安貸款額度最高上限為 1,000 萬元，超過部分需搭配其他方案利率計算。（本工具採單一利率進行全額簡化試算）</p>
                    </div>
                  )}
                </div>
              </div>

              {/* 右側：分析結果區 */}
              <div className="lg:col-span-5 flex flex-col">
                <div className="bg-gray-900 rounded-3xl shadow-xl p-6 md:p-8 text-white sticky top-8 flex-grow flex flex-col">
                  <h2 className="text-xl font-bold mb-6 border-b border-gray-800 pb-4">財務試算結果</h2>
                  
                  <div className="space-y-6 flex-grow">
                    <div>
                      <p className="text-gray-400 text-sm mb-1 font-medium">需貸款總額</p>
                      <p className="text-4xl font-bold text-white tracking-tight">{formatCurrency(results.loanAmount)}</p>
                      <p className="text-gray-500 text-sm mt-2">
                        貸款成數約 <span className="text-gray-300 font-medium">{totalPrice > 0 ? Math.round((results.loanAmount / (totalPrice * 10000)) * 100) : 0}%</span>
                      </p>
                    </div>

                    <div className="h-px bg-gray-800 w-full"></div>

                    <div>
                      <p className="text-gray-400 text-sm mb-3 font-medium">每月還款金額</p>
                      {gracePeriod > 0 ? (
                        <div className="space-y-3">
                          <div className="bg-gray-800/60 p-4 rounded-2xl border border-gray-700/50">
                            <div className="flex justify-between items-center mb-1.5">
                              <span className="text-sm font-medium text-yellow-400">前 {gracePeriod} 年 (寬限期)</span>
                              <span className="text-xs text-gray-400 bg-gray-900 px-2 py-0.5 rounded-full">僅繳利息</span>
                            </div>
                            <p className="text-2xl font-bold text-yellow-400">{formatCurrency(results.monthlyPaymentGrace)} <span className="text-sm font-normal text-gray-500">/月</span></p>
                          </div>
                          <div className="bg-gray-800/60 p-4 rounded-2xl border border-gray-700/50">
                            <div className="flex justify-between items-center mb-1.5">
                              <span className="text-sm font-medium text-white">第 {gracePeriod + 1} 年起</span>
                              <span className="text-xs text-gray-400 bg-gray-900 px-2 py-0.5 rounded-full">{repaymentMethod === 'equal-pi' ? '固定本息' : '首月本息'}</span>
                            </div>
                            {repaymentMethod === 'equal-pi' ? (
                                <p className="text-2xl font-bold text-white">{formatCurrency(results.monthlyPaymentAmortization)} <span className="text-sm font-normal text-gray-500">/月</span></p>
                            ) : (
                                <div>
                                    <p className="text-2xl font-bold text-white">{formatCurrency(results.firstMonthAmortization)} <span className="text-sm font-normal text-gray-500">/月</span></p>
                                    <p className="text-sm text-gray-400 mt-1">之後每月約遞減 <span className="text-gray-300">{formatCurrency(results.monthlyDecrease)}</span></p>
                                </div>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div className="bg-gray-800 p-5 rounded-2xl border border-gray-700">
                          {repaymentMethod === 'equal-pi' ? (
                              <div>
                                <p className="text-3xl font-bold text-blue-400">{formatCurrency(results.monthlyPaymentAmortization)} <span className="text-lg font-normal text-gray-500">/月</span></p>
                                <p className="text-gray-400 text-sm mt-2">採本息平均攤還，每月金額固定</p>
                              </div>
                          ) : (
                              <div>
                                <p className="text-3xl font-bold text-blue-400">{formatCurrency(results.firstMonthAmortization)} <span className="text-lg font-normal text-gray-500">/首月</span></p>
                                <p className="text-gray-400 text-sm mt-2">採本金平均攤還，之後每月約遞減 <span className="text-blue-300 font-medium">{formatCurrency(results.monthlyDecrease)}</span></p>
                              </div>
                          )}
                        </div>
                      )}
                    </div>

                    <div className="h-px bg-gray-800 w-full"></div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="bg-gray-800/30 p-4 rounded-xl">
                        <p className="text-gray-400 text-xs mb-1.5">累計總利息</p>
                        <p className="text-xl font-semibold text-red-400">{formatCurrency(results.totalInterest)}</p>
                      </div>
                      <div className="bg-gray-800/30 p-4 rounded-xl">
                        <p className="text-gray-400 text-xs mb-1.5">本息總支出</p>
                        <p className="text-xl font-semibold text-white">{formatCurrency(results.totalPayment)}</p>
                      </div>
                    </div>
                  </div>

                  <button onClick={handleShareToLine} className="w-full mt-8 bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 active:translate-y-0">
                    <IconMessage size={20} className="mr-2" />
                    分享結果至 LINE
                  </button>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MortgageCalculator />);
  </script>
</body>
</html>
